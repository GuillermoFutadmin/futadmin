[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python railway_init.py && gunicorn app:app --worker-class gevent --workers 4 --timeout 120 --bind 0.0.0.0:$PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[volumes]]
name = "uploads"
mountPath = "/app/static/uploads"
