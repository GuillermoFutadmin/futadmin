<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate Gratis - FutAdmin</title>
    <link rel="icon" type="image/png" href="/static/img/logos/futadmin_circle_transp.png">
    <link rel="apple-touch-icon" href="/static/img/sidebar-logo.png">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.25);
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ef4444;
            --success-bg: rgba(0, 255, 136, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            padding: 2.5rem 2rem;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 30px var(--primary-glow);
            border: 2px solid rgba(0, 255, 136, 0.2);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .badge-free {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), #00cc6e);
            color: #0f172a;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 0.6rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 0.97rem;
            transition: all 0.25s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .btn-register {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--primary), #00cc6e);
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px -5px rgba(0, 255, 136, 0.3);
            letter-spacing: 0.03em;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px -8px rgba(0, 255, 136, 0.4);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--primary);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .privacy-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 0.8rem 0 1rem;
        }

        .privacy-row input[type="checkbox"] {
            width: auto;
            margin-top: 3px;
            accent-color: var(--primary);
        }

        .privacy-row label {
            text-transform: none;
            font-weight: 400;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .privacy-row a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* ── Panel de Cuentas Creadas ─────────────────────────────────────── */
        .cuentas-panel {
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .cuentas-panel h2 {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        .cuentas-panel .hint {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .password-banner {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .password-banner .pw-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .password-banner .pw-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.05em;
            margin-top: 0.2rem;
        }

        .cuenta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            margin-bottom: 0.6rem;
        }

        .cuenta-item .ci-email {
            font-size: 0.85rem;
            font-weight: 600;
            word-break: break-all;
        }

        .cuenta-item .ci-rol {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            margin-left: 6px;
        }

        .rol-dueno {
            background: rgba(0, 255, 136, 0.15);
            color: var(--primary);
        }

        .rol-arbitro {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .rol-lector {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
        }

        .btn-copy-all {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.6rem;
            transition: all 0.2s;
        }

        .btn-copy-all:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        .btn-go-login {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 1rem;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--primary), #00cc6e);
            border-radius: 12px;
            color: #0f172a;
            font-weight: 800;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-go-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 255, 136, 0.35);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(15, 23, 42, 0.3);
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">

        <!-- ── Formulario de Registro ─────────────────────────────────────── -->
        <div id="form-section">
            <div class="logo-section">
                <img src="/static/img/logos/futadmin_circle.png" class="logo-img" alt="FutAdmin Logo">
                <h1>FutAdmin</h1>
                <p class="subtitle">Gestiona tu liga de fútbol</p>
                <span class="badge-free">✦ 100% Gratis</span>
            </div>

            <div id="error-box" class="alert alert-error"></div>

            <form id="registro-form">
                <div class="form-group">
                    <label for="nombre_liga">Nombre de tu Liga</label>
                    <input type="text" id="nombre_liga" required placeholder="Ej: Liga Municipal Tijuana"
                        autocomplete="organization">
                </div>
                <div class="form-group">
                    <label for="nombre_admin">Tu Nombre (Administrador)</label>
                    <input type="text" id="nombre_admin" required placeholder="Ej: Juan Pérez" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="admin@ejemplo.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña (mín. 8 caracteres)</label>
                    <input type="password" id="password" required minlength="8" placeholder="••••••••"
                        autocomplete="new-password">
                </div>

                <div class="privacy-row">
                    <input type="checkbox" id="accept_privacy" required>
                    <label for="accept_privacy">
                        He leído y acepto el <a href="/privacy" target="_blank">Aviso de Privacidad</a>
                    </label>
                </div>

                <button type="submit" class="btn-register" id="btn-submit">
                    CREAR MI LIGA GRATIS
                </button>
            </form>

            <div class="footer-link">
                ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
            </div>
        </div>

        <!-- ── Panel de Cuentas Generadas ───────────────────────────────── -->
        <div id="cuentas-panel" class="cuentas-panel">
            <div class="success-icon">🎉</div>
            <h2 id="liga-nombre-ok"></h2>
            <p class="hint">Guarda estas credenciales — se muestran una sola vez.</p>

            <div class="password-banner">
                <div class="pw-label">Contraseña de todas las cuentas</div>
                <div class="pw-value" id="pw-display"></div>
            </div>

            <div id="cuentas-lista"></div>

            <button class="btn-copy-all" id="btn-copy">📋 Copiar todas las cuentas</button>

            <a href="/login" class="btn-go-login">ENTRAR AL SISTEMA →</a>
        </div>

    </div>

    <script>
        const form = document.getElementById('registro-form');
        const errBox = document.getElementById('error-box');
        const btnSub = document.getElementById('btn-submit');

        const ROL_LABELS = {
            'dueño_liga': ['👑 Administrador', 'rol-dueno'],
            'arbitro': ['⚽ Árbitro', 'rol-arbitro'],
            'resultados': ['👁  Solo Vista', 'rol-lector'],
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errBox.style.display = 'none';
            btnSub.disabled = true;
            btnSub.innerHTML = '<span class="spinner"></span>Creando liga...';

            const payload = {
                nombre_liga: document.getElementById('nombre_liga').value.trim(),
                nombre_admin: document.getElementById('nombre_admin').value.trim(),
                email: document.getElementById('email').value.trim().toLowerCase(),
                password: document.getElementById('password').value,
            };

            try {
                const res = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                if (data.success) {
                    mostrarCuentas(data);
                } else {
                    errBox.innerText = data.error || 'Error al registrar';
                    errBox.style.display = 'block';
                    btnSub.disabled = false;
                    btnSub.innerHTML = 'CREAR MI LIGA GRATIS';
                }
            } catch (err) {
                errBox.innerText = 'Error de conexión. Intenta de nuevo.';
                errBox.style.display = 'block';
                btnSub.disabled = false;
                btnSub.innerHTML = 'CREAR MI LIGA GRATIS';
            }
        });

        function mostrarCuentas(data) {
            // Ocultar formulario
            document.getElementById('form-section').style.display = 'none';

            // Rellenar panel
            document.getElementById('liga-nombre-ok').innerText = `¡Liga "${data.liga.nombre}" creada!`;
            document.getElementById('pw-display').innerText = data.password_comun;

            const lista = document.getElementById('cuentas-lista');
            lista.innerHTML = '';
            data.cuentas.forEach(c => {
                const [label, cls] = ROL_LABELS[c.rol] || ['Usuario', 'rol-lector'];
                lista.innerHTML += `
                    <div class="cuenta-item">
                        <span class="ci-email">${c.email}</span>
                        <span class="ci-rol ${cls}">${label}</span>
                    </div>`;
            });

            document.getElementById('cuentas-panel').style.display = 'block';

            // Copiar al portapapeles
            document.getElementById('btn-copy').addEventListener('click', () => {
                const pw = data.password_comun;
                const texto = data.cuentas.map(c => {
                    const [label] = ROL_LABELS[c.rol] || ['Usuario'];
                    return `${label}: ${c.email} | Contraseña: ${pw}`;
                }).join('\n');
                navigator.clipboard.writeText(texto).then(() => {
                    document.getElementById('btn-copy').innerText = '✅ ¡Copiado al portapapeles!';
                });
            });
        }
    </script>
</body>

</html>
