<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate Gratis - FutAdmin</title>
    <link rel="icon" type="image/png" href="/static/img/logos/futadmin_circle_transp.png">
    <link rel="apple-touch-icon" href="/static/img/sidebar-logo.png">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.25);
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.7);
            padding: 2.5rem 2.2rem;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 0 30px var(--primary-glow);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .badge-free {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 0.5rem;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        /* ── Steps Control ─────────────────────────────────────────────────── */
        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .progress-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 2.5rem;
            justify-content: center;
        }

        .progress-dot {
            width: 30px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* ── Form Groups ──────────────────────────────────────────────────── */
        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #00cc6e);
            color: #0f172a;
            box-shadow: 0 10px 20px -5px rgba(0, 255, 136, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -8px rgba(0, 255, 136, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* ── Alert ─────────────────────────────────────────────────────────── */
        #alert-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        /* ── Success ───────────────────────────────────────────────────────── */
        .success-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-card);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            from {
                opacity: 0;
                transform: scale(0.3);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── Honeypot ──────────────────────────────────────────────────────── */
        .hp-field {
            display: none !important;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo-section">
            <img src="/static/img/logos/futadmin_circle.png" class="logo-img" alt="Logo">
            <h1>FutAdmin</h1>
            <span class="badge-free">Nueva Liga 100% Gratis</span>
        </div>

        <div class="progress-bar">
            <div class="progress-dot active" id="dot-1"></div>
            <div class="progress-dot" id="dot-2"></div>
            <div class="progress-dot" id="dot-3"></div>
        </div>

        <div id="alert-box"></div>

        <form id="reg-form">
            <!-- Honeypot -->
            <input type="text" name="website_url" class="hp-field">

            <!-- STEP 1: LIGA -->
            <div class="step-container active" id="step-1">
                <div class="form-group">
                    <label>Nombre de tu Liga</label>
                    <input type="text" id="nombre_liga" placeholder="Ej: Liga Premier Tijuana" required>
                </div>
                <div class="form-group">
                    <label>Municipio</label>
                    <input type="text" id="municipio" placeholder="Ej: Tijuana" required>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" id="estado" placeholder="Ej: Baja California" required>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn btn-primary" onclick="nextStep(2)">Siguiente →</button>
                </div>
            </div>

            <!-- STEP 2: ADMIN -->
            <div class="step-container" id="step-2">
                <div class="form-group">
                    <label>Tu Nombre Completo</label>
                    <input type="text" id="nombre_admin" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="admin@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Teléfono / WhatsApp</label>
                    <input type="text" id="telefono" placeholder="Ej: 664 123 4567" required>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn btn-secondary" onclick="nextStep(1)">Atrás</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(3)">Siguiente →</button>
                </div>
            </div>

            <!-- STEP 3: SECURITY -->
            <div class="step-container" id="step-3">
                <div class="form-group">
                    <label>Crea tu Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                </div>
                <div class="form-group" style="display: flex; gap: 10px; align-items: flex-start; margin-top: 1rem;">
                    <input type="checkbox" id="privacy" required style="width: 20px; height: 20px; margin-top: 2px;">
                    <label for="privacy" style="text-transform: none; font-weight: 400; cursor: pointer;">
                        Acepto el <a href="/privacy" target="_blank"
                            style="color: var(--primary); text-decoration: none;">Aviso de Privacidad</a>
                    </label>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn btn-secondary" onclick="nextStep(2)">Atrás</button>
                    <button type="submit" class="btn btn-primary" id="btn-submit">FINALIZAR REGISTRO</button>
                </div>
            </div>
        </form>

        <div class="form-footer" id="login-link">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
        </div>

        <!-- Success Overlay -->
        <div class="success-overlay" id="success-overlay">
            <div class="success-icon">🏟️</div>
            <h2>¡Todo listo!</h2>
            <p style="color: var(--text-muted); margin-top: 10px;">Tu plataforma está configurada.<br>Entrando al
                sistema...</p>
        </div>
    </div>

    <script>
        let currentStep = 1;

        function nextStep(step) {
            // Validaciones simples antes de pasar
            if (step > currentStep) {
                const inputs = document.getElementById(`step-${currentStep}`).querySelectorAll('input');
                let valid = true;
                inputs.forEach(i => { if (!i.checkValidity()) { i.reportValidity(); valid = false; } });
                if (!valid) return;
            }

            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.progress-dot').forEach(d => d.classList.remove('active'));

            document.getElementById(`step-${step}`).classList.add('active');
            for (let i = 1; i <= step; i++) {
                document.getElementById(`dot-${i}`).classList.add('active');
            }
            currentStep = step;
        }

        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const alertBox = document.getElementById('alert-box');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creando liga...';
            alertBox.style.display = 'none';

            const payload = {
                nombre_liga: document.getElementById('nombre_liga').value,
                municipio: document.getElementById('municipio').value,
                estado: document.getElementById('estado').value,
                nombre_admin: document.getElementById('nombre_admin').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                password: document.getElementById('password').value,
                website_url: document.querySelector('input[name="website_url"]').value
            };

            try {
                const res = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('success-overlay').style.display = 'flex';
                    setTimeout(() => {
                        window.location.href = data.redirect_url || '/';
                    }, 2000);
                } else {
                    alertBox.innerText = data.error || 'Ocurrió un error inesperado';
                    alertBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'FINALIZAR REGISTRO';
                }
            } catch (err) {
                alertBox.innerText = 'Error de conexión. Intenta de nuevo.';
                alertBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'FINALIZAR REGISTRO';
            }
        });
    </script>
</body>

</html>
